# PROTECTED: No cambiar versiones ni flujos de CI sin justificacion en PR_JUSTIFICATION.md
# path: binance_dart_sdk/pubspec.yaml
# Workspace ROOT. Pub Workspaces (Dart 3.6+) + Melos 7.x.

name: binance_dart_sdk_workspace
description: Workspace root for the Binance Dart SDK packages.
publish_to: none

environment:
  sdk: ">=3.11.5 <4.0.0"

# === Pub Workspaces (Dart 3.6+) ===
# Lista los miembros del workspace. Se enlazan automáticamente
# sin necesidad de dependency_overrides.
workspace:
  - packages/binance_core
  - packages/binance_spot
  - packages/binance_margin
  - packages/binance_futures
  - examples/futures_position_monitor
  - examples/margin_cross_trade
  - examples/spot_market_watch
  - tools/mock_server

dev_dependencies:
  melos: ^7.0.0

melos:
  name: binance_dart_sdk

  packages:
    - packages/*

  command:
    bootstrap:
      environment:
        sdk: ">=3.11.5 <4.0.0"
      # Versiones COMPARTIDAS (single source of truth).
      # Cada paquete hijo declara estas deps con `any` y melos
      # inyecta la versión definida aquí.
      dependencies:
        meta: ^1.16.0
        http: ^1.2.0
        cryptography: ^2.7.0
        pointycastle: ^3.9.1
        web_socket_channel: ^3.0.0
      dev_dependencies:
        test: ^1.25.15
        mocktail: ^1.0.5
        very_good_analysis: ^7.0.0
        glados: ^1.1.7

    version:
      message: "chore(release): publish binance packages"
      includeCommitId: true

  scripts:
    analyze:
      description: "Analyze every package and example exhaustively."
      run: |
        dart analyze . && \
        dart analyze tools/mock_server && \
        dart analyze examples/futures_position_monitor && \
        dart analyze examples/margin_cross_trade && \
        dart analyze examples/spot_market_watch && \
        melos exec -- "dart analyze ."

    test:
      description: "Run tests in every package that has a /test folder."
      run: dart test
      exec:
        concurrency: 4
      packageFilters:
        dirExists: test

    version:
      run: melos version --yes
      description: Bump versions and generate changelogs using Conventional Commits.

    publish:
      run: melos publish --yes
      description: Publish all packages to pub.dev.

    format:
      description: "Format all Dart files."
      run: dart format --set-exit-if-changed .
      exec:
        concurrency: 4

    format:check:
      description: Check dart format for all packages.
      run: melos exec -- "dart format --output=none --set-exit-if-changed ."
